# RealEstork — Muaban-specific Scoring
# Strategy: Focus on profile transparency (avatar, total listings) and name patterns.
#
# Tuning history:
#   - v1: muaban-specific signals (multi/few_active, avatar_blank, name_is_phone)
#   - v2 (session 12 / 2026-04-28): hạ thresholds 65→60 / 40→38, thêm
#     alert_filters block (wife_min_score 50), bỏ listing_is_vip penalty
#     (mọi muaban đều VIP, signal không discriminate), giảm
#     same_session_multi_listing -20 → -15.
#     Lý do: 18 cycles × ~50 listings/ngày → 0 alert. Trần điểm thực tế = 60.
#     wife_min_score thiếu trong file v1 → fall back default 55, max muaban
#     đạt sau penalty thường chỉ 30-50 → không alert.

version: 2
base_score: 50
threshold_chinh_chu: 60         # nới 65 → 60 (thiếu 3 nhatot-only positive signals)
threshold_can_xac_minh: 38      # nới 40 → 38

alert_filters:
  wife_max_listing_age_hours: 24
  wife_min_score: 50             # nới 55 → 50 (cho phép can_xac_minh score=50 alert)
  wife_min_price_vnd: 15000000   # giữ theo URL muaban (?price=15000000-)
  product_min_score: 60
  wife_allowed_districts:
    - "Quận 1"
    - "Quận 2"
    - "Quận 3"
    - "Quận 4"
    - "Quận 5"
    - "Quận 6"
    - "Quận 7"
    - "Quận 8"
    - "Quận 9"
    - "Quận 10"
    - "Quận 11"
    - "Quận 12"
    - "Bình Thạnh"
    - "Phú Nhuận"
    - "Tân Bình"
    - "Tân Phú"
    - "Bình Tân"
    - "Thủ Đức"
    - "Gò Vấp"

  # Per-district min price override — 3 quận xa hơn chỉ alert tin >= 40M
  district_price_overrides:
    "Quận 12": 40000000
    "Tân Phú": 40000000
    "Bình Tân": 40000000

signals:
  # Overrides for default signals
  account_type_personal:
    weight: 0    # is_company=false is unreliable on Muaban

  text_owner_language:
    weight: -5   # Brokers claim this often

  # Muaban-specific Profile Signals
  muaban_multi_active_listings:
    weight: -40  # >= 5 listings = Broker per user instruction
  
  muaban_few_active_listings:
    weight: +20  # < 5 listings = Owner candidate

  avatar_is_blank:
    weight: +15  # Blank avatar = typical owner

  account_name_is_phone:
    weight: +20  # Name is phone number = strong owner signal

  # listing_is_vip: bỏ — muaban gần như mọi tin VIP, signal không discriminate

  # Time-based signals (critical: muaban chỉ crawl trong 24h nên luôn có data)
  listing_very_fresh:
    weight: +10   # <= 2h: instant priority

  listing_fresh:
    weight: +5    # 2h < age <= 24h: standard fresh

  listing_stale:
    weight: -15   # > 7 ngày (phòng trường hợp VIP pin lâu)

  # Phone spam reputation
  trangtrang_spam_penalty:
    weight: -30   # Muaban có nhiều spam hơn → weight cao hơn default

  # Other default signals to keep
  account_name_broker_keywords:
    weight: -30

  same_session_multi_listing:
    weight: -15   # giảm -20 → -15: muaban có chủ 2-3 mặt bằng phổ biến

  description_no_diacritics:
    weight: +15

  text_marketing_superlatives:
    weight: -20
