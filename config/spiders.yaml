# RealEstork — Spider Configuration
# Plugin-based: enable/disable/tune each spider without redeploy
# Thêm site mới: tạo spiders/new_site.py + thêm entry ở đây

spiders:
  - name: nhatot
    enabled: true
    type: stealthy
    # 2 URL: cả 2 đều dùng f=p (Nhatot's broker filter — strict hơn raw type=u, check
    # profile-level "broker label" tự đánh bởi Nhatot). URL 1 = all BĐS, URL 2 =
    # category-specific để catch tin bị đẩy xuống page sâu. Session 19 fix oversight
    # session 18 (tin 132673950 type=u nhưng môi giới rò qua vì URL 2 thiếu f=p).
    urls:
      - https://www.nhatot.com/thue-bat-dong-san-tp-ho-chi-minh?price=15000000-%2A&f=p              # All BĐS cho thuê, chính chủ filter
      - https://www.nhatot.com/thue-van-phong-mat-bang-kinh-doanh-tp-ho-chi-minh?price=15000000-%2A&f=p  # Văn phòng/MBKD, chính chủ filter
    interval_minutes: 20
    max_pages: 10                    # Hard ceiling per URL — early-stop thường kích hoạt trước
    min_pages_before_early_stop: 5   # Bắt buộc crawl ít nhất 5 page/URL trước khi cho phép early-stop fire
    age_stop_hours: 24               # Dừng khi gặp trang có tin non-VIP cũ hơn 24h (sau khi qua min_pages)
    dedup_stop_ratio: 0.7            # Dừng khi >70% tin trên trang đã seen (sau khi qua min_pages)
    request_delay_seconds: 5

  - name: alonhadat
    enabled: false     # Tạm tắt — focus nhatot trước
    type: http
    url: https://alonhadat.com.vn/cho-thue-nha-mat-tien/ho-chi-minh
    interval_minutes: 30
    max_pages: 3
    request_delay_seconds: 3

  - name: batdongsan
    enabled: true
    type: stealthy
    # Crawl 5 loại BĐS riêng lẻ — mỗi loại có URL slug riêng trên BDS
    # early-stop per URL: dừng khi gặp tin "hôm qua" hoặc dedup >70%
    # interval_minutes ignored — scheduling trong config/schedule.yaml (run_batdongsan_cycle)
    urls:
      - https://batdongsan.com.vn/cho-thue-nha-mat-pho-tp-ho-chi-minh   # Nhà mặt phố
      - https://batdongsan.com.vn/cho-thue-shophouse-nha-pho-thuong-mai-tp-hcm  # Shophouse
      - https://batdongsan.com.vn/cho-thue-kho-nha-xuong-dat-tp-hcm     # Kho, nhà xưởng, đất
      - https://batdongsan.com.vn/cho-thue-nha-rieng-tp-hcm             # Nhà riêng
      - https://batdongsan.com.vn/cho-thue-nha-biet-thu-lien-ke-tp-hcm  # Nhà biệt thự, liền kề
    interval_minutes: 20
    max_pages: 50              # Safety cap per URL — early-stop thường kích hoạt trước
    request_delay_seconds: 5
    detail_concurrency: 3      # Giảm để tránh Cloudflare block
    dedup_stop_ratio: 0.7      # Early-stop khi >70% của page đã seen

  - name: homedy
    enabled: false      # Phase 1.5
    type: http
    url: https://homedy.com/cho-thue-mat-bang/tp-hcm
    interval_minutes: 60
    max_pages: 3

  - name: muaban
    enabled: true
    type: stealthy
    # Crawl 3 category — sort=1 mandatory cho early-stop, price filter parity với behavior cũ
    urls:
      - https://muaban.net/bat-dong-san/cho-thue-nha-ho-chi-minh?sort=1&price=15000000-100000000          # Nhà cho thuê
      - https://muaban.net/bat-dong-san/cho-thue-van-phong-mat-bang-ho-chi-minh?sort=1&price=15000000-100000000   # Văn phòng / mặt bằng KD
      - https://muaban.net/bat-dong-san/cho-thue-nha-xuong-kho-dat-ho-chi-minh?sort=1&price=15000000-100000000    # Nhà xưởng / kho / đất
    interval_minutes: 30
    max_pages: 50              # Per URL — early-stop thường kích hoạt ở pages 1-2 trong steady state
    request_delay_seconds: 5
    detail_concurrency: 3      # Stage-2 concurrent detail fetch (contact_name + phone), global across URLs
    dedup_stop_ratio: 0.7      # Per-URL early-stop khi >70% của page đã seen

  - name: cafeland
    enabled: false      # Phase 2
    type: http
    interval_minutes: 60

  - name: facebook_groups
    enabled: false      # Enable khi ready
    type: http
    # pip install facebook-scraper (public groups only, MVP free)
    interval_minutes: 60
    groups:
      - "cho.thue.mat.bang.kinh.doanh.tphcm"
      - "sang.nhuong.quan.cho.thue.mat.bang.tphcm"
      - "Cho-Thue-Mat-Bang-KINH-DOANH-TpHCM"

  - name: zalo_web
    enabled: false      # Optional, risk bị block account
    type: dynamic
    interval_minutes: 120
